name: Redeploy rapido de precios y paginas

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: actualizacion-catalogo
  cancel-in-progress: false

jobs:
  redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Restaurar configuracion y credenciales
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_PICKLE_B64: ${{ secrets.GOOGLE_TOKEN_PICKLE_B64 }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
        run: |
          printf '%s' "$ENV_FILE" > config/.env
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > config/credentials.json
          printf '%s' "$GOOGLE_TOKEN_PICKLE_B64" | base64 -d > config/token.pickle
          printf '%s\n' "$GOOGLE_SHEETS_ID" > config/sheets_id.txt

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Recalcular precios y regenerar paginas
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/00_actualizar_sistema_completo.py --sin-scraper --auto-push

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artifact de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './pages'

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
