name: Actualizacion diaria del catalogo

on:
  repository_dispatch:
    types: [actualizacion_diaria]
  schedule:
    # RESPALDO por si el trigger externo (03:06 ART) falla. Corre a las
    # 08:15 UTC (05:15 ART) — franja con poco retraso de GitHub — y el job
    # "chequear" lo saltea si ya hubo una actualización en las últimas 20 h,
    # así no se duplica la corrida diaria.
    - cron: '15 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: actualizacion-catalogo
  cancel-in-progress: false

jobs:
  # Evita la corrida duplicada: el cron de respaldo solo sigue si NO hubo
  # una actualización automática reciente (el trigger externo y el manual
  # siempre corren).
  chequear:
    runs-on: ubuntu-latest
    outputs:
      correr: ${{ steps.check.outputs.correr }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 80
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "correr=si" >> "$GITHUB_OUTPUT"
            echo "Trigger ${{ github.event_name }}: corre siempre."
            exit 0
          fi
          ULTIMO=$(git log --grep='del catálogo - 20' -1 --format=%ct || true)
          ULTIMO=${ULTIMO:-0}
          AHORA=$(date +%s)
          EDAD_H=$(( (AHORA - ULTIMO) / 3600 ))
          if [ "$ULTIMO" != "0" ] && [ "$EDAD_H" -lt 20 ]; then
            echo "correr=no" >> "$GITHUB_OUTPUT"
            echo "Ya hubo una actualización hace ${EDAD_H} h — el respaldo no corre."
          else
            echo "correr=si" >> "$GITHUB_OUTPUT"
            echo "Sin actualización en las últimas 20 h (última hace ${EDAD_H} h) — corre el respaldo."
          fi

  actualizar:
    needs: chequear
    if: needs.chequear.outputs.correr == 'si'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Restaurar configuracion y credenciales
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_PICKLE_B64: ${{ secrets.GOOGLE_TOKEN_PICKLE_B64 }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
        run: |
          printf '%s' "$ENV_FILE" > config/.env
          printf '\nGEMINI_API_KEY=%s\n' "$GEMINI_API_KEY" >> config/.env
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > config/credentials.json
          printf '%s' "$GOOGLE_TOKEN_PICKLE_B64" | base64 -d > config/token.pickle
          printf '%s\n' "$GOOGLE_SHEETS_ID" > config/sheets_id.txt

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ejecutar actualizacion completa
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/00_actualizar_sistema_completo.py --modo completo --con-cloudinary --auto-push

      - name: Backup de órdenes y clientes
        run: |
          API_URL=$(grep '^API_URL=' config/.env | cut -d= -f2-)
          ADMIN_PWD=$(grep '^ADMIN_PASSWORD=' config/.env | cut -d= -f2-)
          curl -sf -X POST "$API_URL/api/admin/backup" \
            -H "X-Admin-Password: $ADMIN_PWD" \
            -H "Content-Type: application/json" \
            -o "data/backup_$(date +%Y-%m-%d).json" || echo "Backup no disponible (Render en cold start?)"

      - name: Subir reporte de la corrida
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-actualizacion-${{ github.run_id }}
          path: data/reporte_*.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Subir backup diario
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}
          path: data/backup_*.json
          retention-days: 30
          if-no-files-found: ignore

      # Despliegue de GitHub Pages (incluye pages/facebook_catalog.csv actualizado).
      # Se hace aca porque el push anterior usa GITHUB_TOKEN y no dispara pages.yml.
      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artifact de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './pages'

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Aviso por email si algún paso del job falló (vía Resend, mismo proveedor
      # que los emails transaccionales). Requiere RESEND_API_KEY en config/.env.
      - name: Avisar si la corrida falló
        if: failure()
        run: |
          RESEND_KEY=$(grep '^RESEND_API_KEY=' config/.env | cut -d= -f2-)
          FROM=$(grep '^RESEND_FROM_EMAIL=' config/.env | cut -d= -f2-)
          ADMIN=$(grep '^ADMIN_EMAIL=' config/.env | cut -d= -f2-)
          ADMIN=${ADMIN:-damianes1802@gmail.com}
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ -n "$RESEND_KEY" ]; then
            curl -s -X POST "https://api.resend.com/emails" \
              -H "Authorization: Bearer $RESEND_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"from\":\"El Gadget <${FROM}>\",\"to\":[\"${ADMIN}\"],\"subject\":\"⚠️ Falló la actualización diaria del catálogo\",\"html\":\"<p>La corrida automática del catálogo falló. Revisá el detalle acá:</p><p><a href='${RUN_URL}'>${RUN_URL}</a></p>\"}" \
              && echo "Aviso de fallo enviado a $ADMIN"
          else
            echo "Sin RESEND_API_KEY, no se pudo avisar por email"
          fi
